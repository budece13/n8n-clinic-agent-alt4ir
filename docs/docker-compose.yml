services:
  postgres:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - 'postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER:-n8n}'
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - autoclinic_network
      - coolify
 
  n8n:
    image: 'n8nio/n8n:2.10.2'
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # --- URLs (hardcodeadas, no usar variables de Coolify con sufijo _5678) ---
      - N8N_EDITOR_BASE_URL=${N8N_BASE_URL}
      - WEBHOOK_URL=${N8N_BASE_URL}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=https
      # --- Timezone ---
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Madrid}
      - TZ=${GENERIC_TIMEZONE:-Europe/Madrid}
      # --- Database ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_POOL_SIZE=5
      - DB_POSTGRESDB_CONNECTION_TIMEOUT=3000
      # --- Security ---
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_PROXY_HOPS=1
    volumes:
      - 'n8n-data:/home/node/.n8n'
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- --no-check-certificate http://127.0.0.1:5678/healthz || exit 1'
      interval: 5s
      timeout: 20s
      retries: 10
    networks:
      - default
      - autoclinic_network
      - coolify
 
volumes:
  n8n-data: null
  postgres-data: null
 
networks:
  autoclinic_network:
    external: true
    name: ${AUTOCLINIC_NETWORK_NAME}
  coolify:
    external: true
 