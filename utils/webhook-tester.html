<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP Webhook Tester</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f19;
    --surface: #111828;
    --surface-2: #1a2338;
    --surface-3: #212d45;
    --border: #1e2d4a;
    --border-focus: #38bdf8;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --accent: #38bdf8;
    --accent-soft: rgba(56,189,248,0.12);
    --green: #22c55e;
    --green-soft: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-soft: rgba(239,68,68,0.12);
    --yellow: #eab308;
    --orange: #f97316;
    --purple: #a78bfa;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header .logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #f97316, #eab308);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    font-family: var(--sans);
  }
  .header h1 {
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }
  .header .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* ── Config bar ── */
  .config-bar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .config-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .method-select {
    padding: 0 12px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--orange);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    min-width: 80px;
    text-align: center;
  }
  .method-select:focus {
    border-color: var(--border-focus);
  }

  .url-input {
    flex: 1;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* Headers toggle */
  .headers-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .headers-toggle:hover { color: var(--text); }
  .headers-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .headers-toggle .arrow.open { transform: rotate(90deg); }

  .headers-section {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .headers-section.visible { display: flex; }

  .header-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .header-row input {
    flex: 1;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
  }
  .header-row input:focus { border-color: var(--border-focus); }
  .header-row .remove-btn {
    width: 26px; height: 26px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--red);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-row .remove-btn:hover { background: var(--red-soft); }

  .add-header-btn {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-header-btn:hover { border-color: var(--text-dim); color: var(--text); }

  /* ── Messages ── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages-area::-webkit-scrollbar { width: 6px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
  }
  .empty-state .icon { font-size: 44px; opacity: 0.3; }
  .empty-state p { font-size: 12px; line-height: 1.7; }
  .empty-state code {
    background: var(--surface-2);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--accent);
  }

  .exchange {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg {
    max-width: 90%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg.req { align-self: flex-end; }
  .msg.res { align-self: flex-start; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--text-dim);
    padding: 0 6px;
  }
  .msg-label {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .msg.req .msg-label { color: var(--accent); }
  .msg.res .msg-label { color: var(--green); }
  .msg.res.error .msg-label { color: var(--red); }

  .status-badge {
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
  }
  .status-2xx { background: var(--green-soft); color: var(--green); }
  .status-3xx { background: rgba(168,85,247,0.15); color: var(--purple); }
  .status-4xx { background: rgba(249,115,22,0.15); color: var(--orange); }
  .status-5xx { background: var(--red-soft); color: var(--red); }
  .status-err { background: var(--red-soft); color: var(--red); }

  .msg-body {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
  }

  .msg.req .msg-body {
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.15);
    border-radius: 10px 10px 2px 10px;
  }
  .msg.res .msg-body {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px 10px 10px 2px;
  }
  .msg.res.error .msg-body {
    background: var(--red-soft);
    border-color: rgba(239,68,68,0.25);
  }

  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--surface-3);
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    width: 26px; height: 26px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .msg-body:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--surface); color: var(--text); }

  .loading-dots {
    display: flex; gap: 4px; padding: 8px 0;
  }
  .loading-dots span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── Input area ── */
  .input-area {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .msg-input {
    flex: 1;
    min-height: 56px;
    max-height: 200px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .msg-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .msg-input::placeholder { color: var(--text-dim); }

  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .btn-send {
    background: var(--orange);
    color: #fff;
    height: 44px;
    min-width: 90px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-send:hover:not(:disabled) { background: #fb923c; transform: translateY(-1px); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-send.loading { pointer-events: none; }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .bottom-actions {
    display: flex;
    gap: 6px;
  }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--text-dim); color: var(--text); }

  .msg-count {
    font-size: 10px;
    color: var(--text-dim);
  }

  /* JSON syntax */
  .json-key { color: #7dd3fc; }
  .json-string { color: #86efac; }
  .json-number { color: #fbbf24; }
  .json-bool { color: #c084fc; }
  .json-null { color: #94a3b8; }

  @media (max-width: 600px) {
    .config-row { flex-wrap: wrap; }
    .method-select { min-width: 100%; }
    .msg { max-width: 98%; }
    .header .badge { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">↗</div>
  <h1>Webhook Tester</h1>
  <span class="badge">n8n / HTTP</span>
</div>

<div class="config-bar">
  <div class="config-row">
    <select class="method-select" id="method">
      <option value="POST" selected>POST</option>
      <option value="GET">GET</option>
      <option value="PUT">PUT</option>
      <option value="PATCH">PATCH</option>
      <option value="DELETE">DELETE</option>
    </select>
    <input
      class="url-input"
      id="urlInput"
      type="text"
      value="https://n8n.alt4ir.online/webhook/whatsapp-inbound/"
      placeholder="https://tu-servidor.com/webhook/endpoint"
    />
  </div>

  <div class="headers-toggle" onclick="toggleHeaders()">
    <span class="arrow" id="headersArrow">▸</span>
    <span>Headers</span>
    <span id="headerCount" style="color:var(--accent)">(1)</span>
  </div>

  <div class="headers-section" id="headersSection">
    <div class="header-row" data-idx="0">
      <input type="text" placeholder="Key" value="Content-Type" />
      <input type="text" placeholder="Value" value="application/json" />
      <button class="remove-btn" onclick="removeHeader(this)">×</button>
    </div>
    <button class="add-header-btn" onclick="addHeader()">+ Añadir header</button>
  </div>

  <!-- CORS Proxy toggle -->
  <div style="display:flex; align-items:center; gap:10px; margin-top:4px;">
    <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim);cursor:pointer;user-select:none;">
      <input type="checkbox" id="corsProxy" checked style="accent-color:var(--orange);width:14px;height:14px;cursor:pointer;" />
      <span>CORS Proxy</span>
    </label>
    <select id="proxySelect" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none;cursor:pointer;">
      <option value="corsproxy">corsproxy.io</option>
      <option value="allorigins">allorigins.win</option>
    </select>
    <span style="font-size:10px;color:var(--text-dim);opacity:0.7;">Evita bloqueo CORS del navegador</span>
  </div>
</div>

<div class="messages-area" id="messagesArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">📡</div>
    <p>
      Envía un payload JSON a tu webhook<br>
      y visualiza la respuesta aquí.<br><br>
      Endpoint: <code id="emptyUrl">n8n.alt4ir.online</code>
    </p>
  </div>
</div>

<div class="input-area">
  <!-- Quick message input -->
  <div style="display:flex; gap:8px; align-items:center;">
    <span style="font-size:11px;color:var(--text-dim);white-space:nowrap;">💬 Mensaje:</span>
    <input
      type="text"
      class="url-input"
      id="quickMsg"
      value="hola"
      placeholder="Escribe tu mensaje aquí..."
      style="flex:1;font-size:13px;"
    />
    <button class="btn btn-send" id="btnSend" onclick="sendRequest()" style="height:40px;">
      ▶ Enviar
    </button>
  </div>

  <!-- Editable fields row -->
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <div style="flex:1;min-width:180px;">
      <label style="font-size:10px;color:var(--text-dim);display:block;margin-bottom:3px;">Nombre</label>
      <input type="text" class="url-input" id="fieldName" value="Jesús" style="width:100%;font-size:11px;padding:7px 10px;" />
    </div>
    <div style="flex:1;min-width:160px;">
      <label style="font-size:10px;color:var(--text-dim);display:block;margin-bottom:3px;">Teléfono (from / wa_id)</label>
      <input type="text" class="url-input" id="fieldPhone" value="+34677668866" style="width:100%;font-size:11px;padding:7px 10px;" />
    </div>
    <div style="flex:0.7;min-width:130px;">
      <label style="font-size:10px;color:var(--text-dim);display:block;margin-bottom:3px;">Message ID</label>
      <input type="text" class="url-input" id="fieldMsgId" value="test-msg-001" style="width:100%;font-size:11px;padding:7px 10px;" />
    </div>
  </div>

  <!-- Payload preview toggle -->
  <div class="headers-toggle" onclick="togglePayload()">
    <span class="arrow" id="payloadArrow">▸</span>
    <span>Ver/Editar payload completo</span>
  </div>
  <div class="headers-section" id="payloadSection">
    <textarea
      class="msg-input"
      id="msgInput"
      style="min-height:200px;font-size:11px;"
      spellcheck="false"
    ></textarea>
    <div style="display:flex;gap:6px;">
      <button class="btn-sm" onclick="formatInput()">{ } Formatear</button>
      <button class="btn-sm" onclick="regeneratePayload()">↻ Regenerar desde campos</button>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-actions">
      <button class="btn-sm" onclick="clearMessages()">Limpiar mensajes</button>
    </div>
    <span class="msg-count" id="msgCount"></span>
  </div>
</div>

<script>
  let reqCount = 0;
  const messagesArea = document.getElementById('messagesArea');

  // ── Build WhatsApp payload ──
  function buildPayload() {
    const msg = document.getElementById('quickMsg').value;
    const name = document.getElementById('fieldName').value;
    const phone = document.getElementById('fieldPhone').value;
    const msgId = document.getElementById('fieldMsgId').value;
    const ts = Math.floor(Date.now() / 1000).toString();

    return {
      object: "whatsapp_business_account",
      entry: [{
        changes: [{
          value: {
            messages: [{
              from: phone,
              id: msgId,
              timestamp: ts,
              text: { body: msg },
              type: "text"
            }],
            contacts: [{
              profile: { name: name },
              wa_id: phone
            }],
            metadata: {
              phone_number_id: "123456789"
            }
          }
        }]
      }]
    };
  }

  function regeneratePayload() {
    const payload = buildPayload();
    document.getElementById('msgInput').value = JSON.stringify(payload, null, 2);
  }

  // Initialize payload on load
  regeneratePayload();

  // ── Payload preview toggle ──
  function togglePayload() {
    const s = document.getElementById('payloadSection');
    const a = document.getElementById('payloadArrow');
    s.classList.toggle('visible');
    a.classList.toggle('open');
    if (s.classList.contains('visible')) {
      regeneratePayload();
    }
  }

  // ── Headers management ──
  function toggleHeaders() {
    const s = document.getElementById('headersSection');
    const a = document.getElementById('headersArrow');
    s.classList.toggle('visible');
    a.classList.toggle('open');
  }

  function addHeader() {
    const section = document.getElementById('headersSection');
    const btn = section.querySelector('.add-header-btn');
    const row = document.createElement('div');
    row.className = 'header-row';
    row.innerHTML = `
      <input type="text" placeholder="Key" />
      <input type="text" placeholder="Value" />
      <button class="remove-btn" onclick="removeHeader(this)">×</button>
    `;
    section.insertBefore(row, btn);
    updateHeaderCount();
  }

  function removeHeader(btn) {
    btn.parentElement.remove();
    updateHeaderCount();
  }

  function updateHeaderCount() {
    const rows = document.querySelectorAll('.header-row');
    document.getElementById('headerCount').textContent = `(${rows.length})`;
  }

  function getHeaders() {
    const headers = {};
    document.querySelectorAll('.header-row').forEach(row => {
      const inputs = row.querySelectorAll('input');
      const k = inputs[0].value.trim();
      const v = inputs[1].value.trim();
      if (k) headers[k] = v;
    });
    return headers;
  }

  // ── Format ──
  function formatInput() {
    const el = document.getElementById('msgInput');
    try {
      el.value = JSON.stringify(JSON.parse(el.value), null, 2);
    } catch (e) {
      addSystemMsg('⚠ JSON inválido');
    }
  }

  // ── Send request ──
  async function sendRequest() {
    const url = document.getElementById('urlInput').value.trim();
    const method = document.getElementById('method').value;
    const btn = document.getElementById('btnSend');

    if (!url) { addSystemMsg('⚠ Introduce una URL'); return; }

    // Use payload editor if visible & manually edited, otherwise build from fields
    const payloadSection = document.getElementById('payloadSection');
    let body;
    if (payloadSection.classList.contains('visible')) {
      body = document.getElementById('msgInput').value.trim();
    } else {
      const payload = buildPayload();
      body = JSON.stringify(payload);
    }

    // Validate JSON for methods with body
    let parsedBody = null;
    if (['POST','PUT','PATCH'].includes(method) && body) {
      try {
        parsedBody = JSON.parse(body);
      } catch (e) {
        addSystemMsg('⚠ JSON inválido: ' + e.message);
        return;
      }
    }

    removeEmpty();
    reqCount++;

    // Show request
    const reqId = 'req-' + Date.now();
    addRequestMsg(method, url, parsedBody || body, reqId);

    // Show loading
    const loadingId = 'load-' + Date.now();
    addLoadingMsg(loadingId);

    // Disable button
    btn.classList.add('loading');
    btn.innerHTML = '⏳ Enviando';
    btn.disabled = true;

    const startTime = performance.now();

    try {
      const useProxy = document.getElementById('corsProxy').checked;
      const proxyType = document.getElementById('proxySelect').value;

      const fetchOpts = {
        method,
        headers: getHeaders(),
      };
      if (['POST','PUT','PATCH'].includes(method) && body) {
        fetchOpts.body = body;
      }

      async function decompress(buffer) {
        const uint8 = new Uint8Array(buffer);
        for (const fmt of ['gzip', 'deflate', 'deflate-raw']) {
          try {
            const ds = new DecompressionStream(fmt);
            const w = ds.writable.getWriter();
            w.write(new Uint8Array(uint8));
            w.close();
            const out = await new Response(ds.readable).arrayBuffer();
            const text = new TextDecoder('utf-8').decode(out);
            if (text.length > 0) return text;
          } catch {}
        }
        return null;
      }

      async function readResponse(response) {
        const buffer = await response.arrayBuffer();
        const plain = new TextDecoder('utf-8').decode(buffer);
        if (!plain.includes('�') && (plain.startsWith('{') || plain.startsWith('[') || plain.startsWith('<') || plain.trim().length === 0)) {
          return plain;
        }
        return await decompress(buffer) ?? plain;
      }

      let response;
      let contentType = '';

      // Intenta directo primero (n8n permite CORS en producción); si falla, usa el proxy
      try {
        response = await fetch(url, fetchOpts);
        contentType = response.headers.get('content-type') || '';
      } catch (directErr) {
        if (!useProxy) throw directErr;
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
        response = await fetch(proxyUrl, fetchOpts);
        contentType = response.headers.get('content-type') || '';
      }

      const elapsed = Math.round(performance.now() - startTime);
      let responseText;
      try {
        responseText = await readResponse(response);
      } catch (e) {
        responseText = '[No se pudo leer el body: ' + e.message + ']';
      }

      removeLoading(loadingId);
      addResponseMsg(response.status, response.statusText, responseText, elapsed, contentType);

    } catch (err) {
      const elapsed = Math.round(performance.now() - startTime);
      removeLoading(loadingId);
      addErrorMsg(err.message, elapsed);
    }

    btn.classList.remove('loading');
    btn.innerHTML = '▶ Enviar';
    btn.disabled = false;
    updateCount();
  }

  // ── Message rendering ──
  function removeEmpty() {
    const e = document.getElementById('emptyState');
    if (e) e.remove();
  }

  function addRequestMsg(method, url, body, id) {
    const time = now();
    const bodyStr = typeof body === 'object' ? JSON.stringify(body, null, 2) : body;
    const html = `
      <div class="msg req" id="${id}">
        <div class="msg-meta">
          <span class="msg-label">↑ ${method}</span>
          <span>${truncUrl(url)}</span>
          <span style="margin-left:auto">${time}</span>
        </div>
        <div class="msg-body">
          <button class="copy-btn" onclick="copyRaw(this)" title="Copiar">📋</button>
          <span class="raw-content" style="display:none">${esc(bodyStr)}</span>
          ${bodyStr ? formatJson(bodyStr) : '<em style="color:var(--text-dim)">sin body</em>'}
        </div>
      </div>
    `;
    messagesArea.insertAdjacentHTML('beforeend', html);
    scrollBottom();
  }

  function addLoadingMsg(id) {
    const html = `
      <div class="msg res" id="${id}">
        <div class="msg-meta">
          <span class="msg-label">↓ Respuesta</span>
          <span>esperando...</span>
        </div>
        <div class="msg-body">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    `;
    messagesArea.insertAdjacentHTML('beforeend', html);
    scrollBottom();
  }

  function removeLoading(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function addResponseMsg(status, statusText, body, elapsed, contentType) {
    const time = now();
    const statusClass = status >= 500 ? 'status-5xx' :
                        status >= 400 ? 'status-4xx' :
                        status >= 300 ? 'status-3xx' : 'status-2xx';
    const isError = status >= 400;
    const isHtmlResponse = body && body.trim().startsWith('<');
    const ctLabel = contentType ? `<span style="font-size:10px;color:var(--text-dim);font-family:var(--mono)">${esc(contentType.split(';')[0])}</span>` : '';
    const warnHtml = isHtmlResponse ? `<div style="color:var(--yellow);font-size:11px;margin-bottom:8px">⚠ El proxy devolvió HTML. Prueba sin proxy o cambia el proxy.</div>` : '';

    const uid = 'r' + Date.now();
    const html = `
      <div class="msg res ${isError ? 'error' : ''}">
        <div class="msg-meta">
          <span class="msg-label">↓ Respuesta</span>
          <span class="status-badge ${statusClass}">${status} ${statusText}</span>
          <span>${elapsed}ms</span>
          ${ctLabel}
          <button onclick="toggleRawView('${uid}')" style="margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:5px;cursor:pointer;">RAW</button>
          <span style="color:var(--text-dim)">${time}</span>
        </div>
        <div class="msg-body" id="fmt-${uid}">
          <button class="copy-btn" onclick="copyRaw(this)" title="Copiar">📋</button>
          <span class="raw-content" style="display:none">${esc(body)}</span>
          ${warnHtml}
          ${body ? formatJson(body) : '<em style="color:var(--text-dim)">respuesta vacía</em>'}
        </div>
        <pre id="raw-${uid}" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;line-height:1.6;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin-top:4px;color:var(--text)"></pre>
      </div>
    `;
    messagesArea.insertAdjacentHTML('beforeend', html);
    // Set raw text via textContent to avoid any encoding issues
    document.getElementById('raw-' + uid).textContent = body || '';
    scrollBottom();
  }

  function toggleRawView(uid) {
    const fmt = document.getElementById('fmt-' + uid);
    const raw = document.getElementById('raw-' + uid);
    const isRaw = raw.style.display !== 'none';
    fmt.style.display = isRaw ? '' : 'none';
    raw.style.display = isRaw ? 'none' : '';
  }

  function addErrorMsg(message, elapsed) {
    const time = now();
    const html = `
      <div class="msg res error">
        <div class="msg-meta">
          <span class="msg-label">✗ Error</span>
          <span class="status-badge status-err">FAILED</span>
          <span>${elapsed}ms</span>
          <span style="margin-left:auto">${time}</span>
        </div>
        <div class="msg-body">
          ${esc(message)}
          <br><br>
          <em style="color:var(--text-dim);font-size:11px">
            Posibles causas: CORS, red, o el servidor no responde.
            Si es CORS, prueba desde un backend o usa un proxy.
          </em>
        </div>
      </div>
    `;
    messagesArea.insertAdjacentHTML('beforeend', html);
    scrollBottom();
  }

  function addSystemMsg(text) {
    removeEmpty();
    const html = `
      <div style="text-align:center;padding:6px;font-size:11px;color:var(--yellow);animation:fadeIn 0.3s">
        ${esc(text)}
      </div>
    `;
    messagesArea.insertAdjacentHTML('beforeend', html);
    scrollBottom();
  }

  // ── Helpers ──
  function now() {
    return new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function truncUrl(url) {
    try {
      const u = new URL(url);
      return u.hostname + u.pathname;
    } catch { return url.slice(0, 40); }
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatJson(str) {
    try {
      const obj = JSON.parse(str);
      return highlight(JSON.stringify(obj, null, 2));
    } catch {
      return esc(str);
    }
  }

  function highlight(json) {
    json = esc(json);
    return json.replace(
      /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
      m => {
        let c = 'json-number';
        if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
        else if (/true|false/.test(m)) c = 'json-bool';
        else if (/null/.test(m)) c = 'json-null';
        return `<span class="${c}">${m}</span>`;
      }
    );
  }

  function copyRaw(btn) {
    const raw = btn.parentElement.querySelector('.raw-content');
    const text = raw ? raw.textContent : '';
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = '📋', 1200);
    });
  }

  function scrollBottom() {
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }

  function clearMessages() {
    messagesArea.innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="icon">📡</div>
        <p>Envía un payload JSON a tu webhook<br>y visualiza la respuesta aquí.</p>
      </div>
    `;
    reqCount = 0;
    updateCount();
  }

  function updateCount() {
    document.getElementById('msgCount').textContent = reqCount ? `${reqCount} peticion${reqCount > 1 ? 'es' : ''}` : '';
  }

  // Enter to send
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendRequest();
    }
  });

  document.getElementById('quickMsg').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendRequest();
    }
  });
</script>

</body>
</html>
